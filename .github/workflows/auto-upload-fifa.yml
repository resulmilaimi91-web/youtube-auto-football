name: YouTube Auto FIFA Channel

on:
  schedule:
    - cron: "0 6,18 * * *"
  workflow_dispatch:

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Restore upload quota cache
        uses: actions/cache@v4
        with:
          path: upload_quota.json
          key: upload-quota-fifa-${{ github.run_id }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install FFmpeg & fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core fonts-freefont-ttf

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate & Upload FIFA Content
        env:
          CONTENT_TYPE: fifa
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.FIFA_REFRESH_TOKEN }}
          CHANNEL_NAME: ${{ secrets.FIFA_CHANNEL_NAME }}
        run: python -m src.main

      - name: Save upload quota cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: upload_quota.json
          key: upload-quota-fifa-${{ github.run_id }}
