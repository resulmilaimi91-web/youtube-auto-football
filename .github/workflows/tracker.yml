name: Daily Progress Tracker

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  track:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements.txt google-auth google-auth-oauthlib google-api-python-client isodate
      - name: Track progress
        env:
          YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
          YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
          YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        run: python -m src.tracker
      - uses: actions/cache/save@v4
        with:
          path: progress.json
          key: progress-${{ github.run_id }}
